name: release

# Build, test, and publish the installer to GitHub Releases.
# Trigger by pushing a version tag that matches package.json, e.g.:
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
# The installed app's auto-updater then picks up the new release on next launch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # electron-builder needs this to create the Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
